<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>SelfChat</title>
  <style>
    /* Minimal, functional-only styling (brutalist: default fonts/colors). */
    html,
    body {
      margin: 0;
    }

    /* Height is driven by JS (visualViewport) so the mobile keyboard is handled.
       100dvh is only a fallback for browsers without visualViewport. */
    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      /* border-box keeps the padding inside the viewport height, so this
         acts like an outer margin without introducing a page scrollbar. */
      box-sizing: border-box;
      padding: 8px;
    }

    /* The only scrollable area is the chat log itself. */
    #chat-box {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-wrap: break-word;
      /* Stack messages from the bottom so the newest ones sit next to the
         input. This keeps recent messages visible even with few messages or
         when the page is zoomed while typing. */
      display: flex;
      flex-direction: column;
    }

    /* Pushes the message list down so it grows upward from the bottom. */
    #chat-messages {
      margin-top: auto;
    }

    #chat-form {
      display: flex;
    }

    #chat-input {
      flex: 1 1 auto;
      /* Grows with content up to a cap, then scrolls internally. */
      max-height: 40vh;
      overflow-y: auto;
      /* >= 16px stops mobile browsers from auto-zooming on focus, which was
         pushing the Send button off-screen. */
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>SelfChat</h1>

  <div id="chat-box">
    <div id="chat-messages"></div>
  </div>

  <form id="chat-form">
    <textarea id="chat-input" rows="1" placeholder="type message"
      autocomplete="off" autofocus></textarea>
    <button type="submit">Send / Swap</button>
  </form>

  <p id="footer-actions">
    <a href="#" id="btn-export">Export .txt</a> |
    <a href="#" id="btn-flush">Flush Cache</a>
  </p>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const box = document.getElementById('chat-box');
    const messages = document.getElementById('chat-messages');
    const btnExport = document.getElementById('btn-export');
    const btnFlush = document.getElementById('btn-flush');

    const STORAGE_KEY = 'selfchat_data';

    // Size the app to the actually-visible area. On mobile, the on-screen
    // keyboard shrinks visualViewport.height (unlike 100dvh, which often does
    // not update), so the input and the latest messages stay reachable.
    const vv = window.visualViewport;
    function fitToViewport() {
      if (!vv) return;
      document.body.style.height = vv.height + 'px';
      box.scrollTop = box.scrollHeight;
    }
    if (vv) {
      vv.addEventListener('resize', fitToViewport);
      vv.addEventListener('scroll', fitToViewport);
      fitToViewport();
    }

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      messages: [],
      currentAuthor: 0
    };

    renderAll();

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();

      if (text) {
        // If there is text, append it and KEEP the current turn
        state.messages.push({
          author: state.currentAuthor,
          text: text
        });
      }
      // SWAP the turn
      state.currentAuthor = state.currentAuthor === 0 ? 1 : 0;

      saveAndRender();

      input.value = '';
      autoResize();
      input.focus();
    });

    // Grow the textarea with its content (up to the CSS max-height)
    function autoResize() {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    }

    input.addEventListener('input', autoResize);

    // Enter submits; Shift+Enter inserts a newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    autoResize();

    btnFlush.addEventListener('click', (e) => {
      e.preventDefault();
      if (confirm("Permanently delete all messages?")) {
        state = { messages: [], currentAuthor: 0 };
        saveAndRender();
      }
    });

    btnExport.addEventListener('click', (e) => {
      e.preventDefault();
      if (state.messages.length === 0) return alert("Nothing to export.");

      let txtContent = "SelfChat Log\n====================\n\n";
      state.messages.forEach(m => {
        const sideLabel = m.author === 0 ? 'PERSONA A' : 'PERSONA B';
        txtContent += `[${sideLabel}]\n${m.text}\n\n`;
      });

      const blob = new Blob([txtContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `selfchat_${new Date().getTime()}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function saveAndRender() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }

    function renderAll() {
      messages.innerHTML = '';

      state.messages.forEach(m => {
        const p = document.createElement('p');
        const isCurrentTurn = m.author === state.currentAuthor;

        if (isCurrentTurn) {
          p.setAttribute('align', 'right');
          p.innerHTML = m.text.replace(/\n/g, '<br>');
        } else {
          p.setAttribute('align', 'left');
          p.innerHTML = `<b>${m.text.replace(/\n/g, '<br>')}</b>`;
        }

        messages.appendChild(p);
      });
    }
  </script>

</body>

</html>
