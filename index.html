<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>SelfChat</title>
</head>

<body>

  <h1>SelfChat</h1>

  <div id="chat-box"></div>

  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="Type message (Empty + Enter to swap turns)" size="60"
      autocomplete="off" autofocus style="font-size: 16px; padding: 4px;">
    <button type="submit" style="font-size: 16px;">Send / Swap</button>
  </form>

  <br>

  <p>
    <a href="#" id="btn-export">Export .txt</a> |
    <a href="#" id="btn-flush">Flush Cache</a>
  </p>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const box = document.getElementById('chat-box');
    const btnExport = document.getElementById('btn-export');
    const btnFlush = document.getElementById('btn-flush');

    const STORAGE_KEY = 'selfchat_data';

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      messages: [],
      currentAuthor: 0
    };

    renderAll();

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();

      if (text) {
        // If there is text, append it and KEEP the current turn
        state.messages.push({
          author: state.currentAuthor,
          text: text
        });
      } else {
        // If empty, SWAP the turn
        state.currentAuthor = state.currentAuthor === 0 ? 1 : 0;
      }

      saveAndRender();

      input.value = '';
      input.focus();
    });

    btnFlush.addEventListener('click', (e) => {
      e.preventDefault();
      if (confirm("Permanently delete all messages?")) {
        state = { messages: [], currentAuthor: 0 };
        saveAndRender();
      }
    });

    btnExport.addEventListener('click', (e) => {
      e.preventDefault();
      if (state.messages.length === 0) return alert("Nothing to export.");

      let txtContent = "SelfChat Log\n====================\n\n";
      state.messages.forEach(m => {
        const sideLabel = m.author === 0 ? 'PERSONA A' : 'PERSONA B';
        txtContent += `[${sideLabel}]\n${m.text}\n\n`;
      });

      const blob = new Blob([txtContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `selfchat_${new Date().getTime()}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function saveAndRender() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }

    function renderAll() {
      box.innerHTML = '';

      state.messages.forEach(m => {
        const p = document.createElement('p');
        const isCurrentTurn = m.author === state.currentAuthor;

        if (isCurrentTurn) {
          p.setAttribute('align', 'right');
          p.innerHTML = m.text.replace(/\n/g, '<br>');
        } else {
          p.setAttribute('align', 'left');
          p.innerHTML = `<b>${m.text.replace(/\n/g, '<br>')}</b>`;
        }

        box.appendChild(p);
      });

      // setTimeout ensures the DOM has updated and mobile keyboards have settled before scrolling
      setTimeout(() => {
        window.scrollTo(0, document.body.scrollHeight);
      }, 50);
    }
  </script>

</body>

</html>
