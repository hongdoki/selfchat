<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>SelfChat</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      /* Use dynamic viewport height so mobile browser chrome / keyboard is handled */
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
    }

    h1 {
      margin: 0;
      padding: 8px 12px;
      flex: 0 0 auto;
    }

    /* The only scrollable area is the chat log itself */
    #chat-box {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 0 12px;
      -webkit-overflow-scrolling: touch;
    }

    #chat-box p {
      margin: 6px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #chat-form {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 8px 12px;
      border-top: 1px solid rgba(128, 128, 128, 0.4);
    }

    #chat-input {
      flex: 1 1 auto;
      resize: none;
      font: inherit;
      line-height: 1.4;
      padding: 8px;
      box-sizing: border-box;
      /* Grows with content up to a cap, then scrolls internally */
      max-height: 40vh;
      overflow-y: auto;
    }

    #chat-form button {
      flex: 0 0 auto;
      padding: 8px 12px;
    }

    #footer-actions {
      flex: 0 0 auto;
      padding: 6px 12px;
      margin: 0;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <h1>SelfChat</h1>

  <div id="chat-box"></div>

  <form id="chat-form">
    <textarea id="chat-input" rows="1" placeholder="Type message (Empty + Enter to swap turns)"
      autocomplete="off" autofocus></textarea>
    <button type="submit">Send / Swap</button>
  </form>

  <p id="footer-actions">
    <a href="#" id="btn-export">Export .txt</a> |
    <a href="#" id="btn-flush">Flush Cache</a>
  </p>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const box = document.getElementById('chat-box');
    const btnExport = document.getElementById('btn-export');
    const btnFlush = document.getElementById('btn-flush');

    const STORAGE_KEY = 'selfchat_data';

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      messages: [],
      currentAuthor: 0
    };

    renderAll();

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();

      if (text) {
        // If there is text, append it and KEEP the current turn
        state.messages.push({
          author: state.currentAuthor,
          text: text
        });
      } else {
        // If empty, SWAP the turn
        state.currentAuthor = state.currentAuthor === 0 ? 1 : 0;
      }

      saveAndRender();

      input.value = '';
      autoResize();
      input.focus();
    });

    // Grow the textarea with its content (up to the CSS max-height)
    function autoResize() {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    }

    input.addEventListener('input', autoResize);

    // Enter submits; Shift+Enter inserts a newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    autoResize();

    btnFlush.addEventListener('click', (e) => {
      e.preventDefault();
      if (confirm("Permanently delete all messages?")) {
        state = { messages: [], currentAuthor: 0 };
        saveAndRender();
      }
    });

    btnExport.addEventListener('click', (e) => {
      e.preventDefault();
      if (state.messages.length === 0) return alert("Nothing to export.");

      let txtContent = "SelfChat Log\n====================\n\n";
      state.messages.forEach(m => {
        const sideLabel = m.author === 0 ? 'PERSONA A' : 'PERSONA B';
        txtContent += `[${sideLabel}]\n${m.text}\n\n`;
      });

      const blob = new Blob([txtContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `selfchat_${new Date().getTime()}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function saveAndRender() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
    }

    function renderAll() {
      box.innerHTML = '';

      state.messages.forEach(m => {
        const p = document.createElement('p');
        const isCurrentTurn = m.author === state.currentAuthor;

        if (isCurrentTurn) {
          p.setAttribute('align', 'right');
          p.innerHTML = m.text.replace(/\n/g, '<br>');
        } else {
          p.setAttribute('align', 'left');
          p.innerHTML = `<b>${m.text.replace(/\n/g, '<br>')}</b>`;
        }

        box.appendChild(p);
      });

      // Scroll only the chat container so the input stays pinned at the bottom
      setTimeout(() => {
        box.scrollTop = box.scrollHeight;
      }, 50);
    }
  </script>

</body>

</html>
